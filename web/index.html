<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ai-ppt 管理台</title>
  <link rel="stylesheet" href="/css/web.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">ai-ppt</div>
        <div class="tagline">HTML 幻灯片生成与管理</div>
      </div>
      <div class="actions">
        <button id="btn-create" class="btn-primary">+ 新建项目</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-title">项目列表</div>
        <div id="project-list" class="project-list"></div>
      </aside>

      <main class="workspace">
        <div id="empty-state" class="empty-state">
          <h2>选择一个项目或创建新项目</h2>
          <p>在左侧选择项目，配置来源与参数后点击生成，即可自动创建 HTML 幻灯片。</p>
        </div>

        <div id="project-panel" class="project-panel hidden">
          <div class="panel-header">
            <h1 id="project-title"></h1>
            <div class="status" id="project-status"></div>
          </div>

          <section class="card">
            <div class="card-title">内容来源</div>
            <div class="tabs">
              <button class="tab active" data-source="article">文章内容</button>
              <button class="tab" data-source="url">网页 URL</button>
            </div>
            <div class="field" id="field-url">
              <label>网页 URL</label>
              <input type="url" id="input-url" placeholder="https://example.com/article">
            </div>
            <div class="field" id="field-article">
              <label>文章内容</label>
              <textarea id="input-article" rows="8" placeholder="粘贴文章或内容..."></textarea>
            </div>
          </section>

          <section class="card">
            <div class="card-title">生成参数</div>
            <div class="fields-grid">
              <div class="field">
                <label>演示标题</label>
                <input type="text" id="input-title">
              </div>
              <div class="field">
                <label>目标受众</label>
                <input type="text" id="input-audience">
              </div>
              <div class="field">
                <label>风格</label>
                <select id="input-style">
                  <option>商业汇报</option>
                  <option>学术演讲</option>
                  <option>产品发布</option>
                  <option>培训课件</option>
                  <option>极简 keynote</option>
                </select>
              </div>
              <div class="field">
                <label>页数</label>
                <input type="number" id="input-slide-count" min="3" max="30">
              </div>
              <div class="field">
                <label>语言</label>
                <select id="input-language">
                  <option value="zh-CN">中文</option>
                  <option value="en">English</option>
                </select>
              </div>
              <div class="field">
                <label>模型</label>
                <input type="text" id="input-model" placeholder="qwen-max">
              </div>
            </div>
          </section>

          <div class="actions-bar">
            <button id="btn-save" class="btn-secondary">保存配置</button>
            <button id="btn-generate" class="btn-primary">生成幻灯片</button>
            <button id="btn-preview" class="btn-secondary" disabled>预览</button>
            <button id="btn-export-pptx" class="btn-secondary" disabled>导出 PPTX</button>
            <button id="btn-export-pptx-image" class="btn-secondary" disabled>导出高清图片 PPTX</button>
          </div>

          <section id="progress-card" class="card progress-card hidden">
            <div class="card-title">生成流程</div>
            <div id="progress-steps" class="progress-steps"></div>
            <div id="progress-log" class="progress-log"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div id="create-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-body">
      <h3>新建项目</h3>
      <div class="field">
        <label>项目标识（英文/数字/中划线）</label>
        <input type="text" id="new-project-name" placeholder="q3-report">
      </div>
      <div class="field">
        <label>演示标题</label>
        <input type="text" id="new-project-title" placeholder="Q3 业务复盘">
      </div>
      <div class="modal-actions">
        <button id="btn-cancel-create" class="btn-secondary">取消</button>
        <button id="btn-confirm-create" class="btn-primary">创建</button>
      </div>
    </div>
  </div>

  <div id="export-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-body">
      <h3>导出</h3>
      <p class="hint">检测到 Ctrl+P / Cmd+P 快捷键</p>
      <div class="export-options">
        <button id="export-pdf" class="btn-secondary">浏览器打印 / PDF</button>
        <button id="export-pptx" class="btn-secondary">下载 PPTX（可编辑文字）</button>
        <button id="export-pptx-image" class="btn-secondary">下载 PPTX（高清图片 · 还原度更高）</button>
      </div>
      <div class="modal-actions">
        <button id="btn-close-export" class="btn-secondary">关闭</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/js/web.js"></script>
</body>
</html>
